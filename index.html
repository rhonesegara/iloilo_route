<!DOCTYPE html>
<html>
<head>
    <title>Iloilo Route</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-info-subtle">

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white text-center">
            <h3>Iloilo Travel Route</h3>
        </div>

        <div class="card-body text-center">
            <select id="route" class="form-select mb-3">
                <option value="Iloilo City - Jereos">Iloilo City - Jereos</option>
                <option value="Iloilo City - Caingin">Iloilo City - Caingin</option>
                <option value="Iloilo City - Baldoza">Iloilo City - Baldoza</option>
                <option value="Iloilo City - San Jose">Iloilo City - San Jose</option>
                <option value="Iloilo City - Tabuc Suba">Iloilo City - Tabuc Suba</option>
            </select>

            <button onclick="saveRoute()" class="btn btn-success">Save Route</button>
            <button onclick="displayRoutes()" class="btn btn-warning">Show Routes</button>
        </div>
    </div>

    <div class="row mt-4" id="output"></div>
</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}

function saveRoute() {
    let route = document.getElementById("route").value;
    let routes = JSON.parse(localStorage.getItem("iloiloRoutes")) || [];
    routes.push(route);
    localStorage.setItem("iloiloRoutes", JSON.stringify(routes));
    alert("Route Saved Successfully!\n" + route);
}

function displayRoutes() {
    let routes = JSON.parse(localStorage.getItem("iloiloRoutes")) || [];
    if(routes.length === 0) {
        alert("No routes saved yet!");
        return;
    }
    let output = document.getElementById("output");
    output.innerHTML = "";
    routes.forEach(function(route) {
        output.innerHTML += `
        <div class="col-md-4 mb-3">
            <div class="card text-bg-primary shadow">
                <div class="card-body">
                    <h5 class="card-title">Saved Route</h5>
                    <p class="card-text">${route}</p>
                </div>
            </div>
        </div>`;
    });
}
</script>

</body>
</html>
